        - PolicyName: CloudFormationDeploymentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudFormation permissions
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource: '*'
              
              # STS permissions for credential validation
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'
              
              # IAM permissions for creating roles and policies
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicyVersions
                Resource: '*'
              
              # Lambda permissions
              - Effect: Allow
                Action:
                  - lambda:*
                Resource: '*'
              
              # S3 permissions
              - Effect: Allow
                Action:
                  - s3:*
                Resource: '*'
              
              # EC2 permissions
              - Effect: Allow
                Action:
                  - ec2:*
                Resource: '*'
              
              # CloudWatch Logs permissions
              - Effect: Allow
                Action:
                  - logs:*
                Resource: '*'
              
              # Secrets Manager permissions
              - Effect: Allow
                Action:
                  - secretsmanager:*
                Resource: '*'
              
              # KMS permissions
              - Effect: Allow
                Action:
                  - kms:*
                Resource: '*'
              
              # SNS permissions
              - Effect: Allow
                Action:
                  - sns:*
                Resource: '*'