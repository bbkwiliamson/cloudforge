<!-- Example of how to use actual logo images -->
<style>
    .sb-logo-img { 
        width: 40px; 
        height: 40px; 
        margin-right: 12px; 
        object-fit: contain; 
    }
    .footer .sb-logo-img { 
        width: 30px; 
        height: 30px; 
        margin-right: 8px; 
    }
</style>

<!-- Header with image logo -->
<div class="header-logo">
    <img src="standard-bank-logo.png" alt="Standard Bank" class="sb-logo-img">
    Standard Bank
</div>

<!-- Footer with image logo -->
<div class="footer-logo">
    <img src="standard-bank-logo.png" alt="Standard Bank" class="sb-logo-img">
    Standard Bank
</div>
